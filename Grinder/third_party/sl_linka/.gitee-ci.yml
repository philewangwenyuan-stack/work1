version: '1.0'
name: SL-Link_code_gen
displayName: SL-Link Code Generation
triggers:
  trigger: auto
  push:
    branches:
      prefix:
        - ''
  tags:
    prefix:
      - v

stages:
  - stage: build_stage
    name: build_stage
    displayName: 'Code Generation'
    steps:
      - step: build@python
        name: generate_code
        displayName: 'Generate C and Python'
        pythonVersion: '3.9'
        cache:
          key: build-generated-${GIT_COMMIT}
          paths:
            - generated/
        commands:
          - 'pip install cmake protobuf'
          - 'echo "Downloading protoc 25.1..."'
          - 'curl -LO https://github.com/protocolbuffers/protobuf/releases/download/v25.1/protoc-25.1-linux-x86_64.zip'
          - 'unzip -o protoc-25.1-linux-x86_64.zip -d tools/protoc'
          - 'chmod +x scripts/generate_proto.sh'
          - './scripts/generate_proto.sh all'
        artifacts:
          - name: generated_code
            path:
              - generated/

      - step: build@gradle
        name: generate_android
        displayName: 'Generate Android (Kotlin)'
        jdkVersion: '17'
        gradleVersion: '8.4'
        commands:
          - 'cd sdk/android'
          - 'chmod +x gradlew'
          - './gradlew generateReleaseProto syncGeneratedProtos'
        artifacts:
          - name: generated_kotlin
            path:
              - generated/kotlin/

  - stage: test_stage
    name: test_stage
    displayName: 'Verification'
    steps:
      - step: build@python
        name: verify_embedded
        displayName: 'Verify Embedded'
        pythonVersion: '3.9'
        cache:
          key: build-generated-${GIT_COMMIT}
          paths:
            - generated/
        commands:
          - 'pip install cmake'
          - 'cd sdk/embedded'
          - 'mkdir -p build && cd build'
          - 'cmake ..'
          - 'make'
          - 'ctest --output-on-failure'
